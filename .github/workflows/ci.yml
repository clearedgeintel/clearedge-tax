name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # The PII helper refuses to load without a key. Use a deterministic
      # 32-byte key for CI so the security suite passes (the key is for
      # tests only — production uses a real, separate key).
      PII_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      # DATABASE_URL is required at import time by src/lib/db.ts. Tests
      # never touch the DB (Prisma is mocked in unit tests), so a dummy
      # URL is sufficient.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # `prisma generate` is wired into `postinstall` but documented
        # here so future readers can find it. `npm ci` triggers it.
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run
